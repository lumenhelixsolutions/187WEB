name: Deploy showcase to GitHub Pages

# Builds the showcase as a fully static site and publishes it to GitHub Pages.
# The full-stack app (Prisma + API routes + server actions) is excluded from this
# build — Pages can't run a server — so the deployed site is the visual showcase only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_BASE_PATH: "/187WEB"
      NEXT_PUBLIC_SITE_URL: "https://lumenhelixlab.github.io/187WEB"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only modules (incompatible with static export)
        run: |
          rm -rf app/api
          # Fail the build if any Server Action modules remain (static export cannot use them).
          if grep -R --include='*.ts' --include='*.tsx' -n '"use server"' app 2>/dev/null; then
            echo "::error::Server Actions found under app/ — remove or gate them for static export"
            exit 1
          fi

      - name: Build static export
        run: npx next build

      - name: Disable Jekyll (serve _next/ assets verbatim)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
